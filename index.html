<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Five Nights at Tech</title>
  <link rel="stylesheet" href="css/startgame.css">
  <link rel="stylesheet" href="css/game-utils.css">
  <link rel="icon" href="https://lcnjoel.com/css/standard.css">
  <link rel="stylesheet" href="css/clock.css">
</head>
<body>
  <!-- is to remove dn -->
  <main class="start-game screen " id="top-start-screen" aria-label="Five Nights at Freddy's home screen">
    <section class="menu">
      <h1 class="title">
        <span>Five</span>
        <span>Nights</span>
        <span>At</span>
        <span>Tech</span>
      </h1>
      <nav class="actions" aria-label="Main menu">
        <button type="button" data-action="new-game"><span class="caret">&gt;&gt;</span> New Game</button>
        <button type="button" data-action="continue">Continue</button>
      </nav>
    </section>

    <footer class="footer">
      <span class="version">v 1.13</span>
      <span class="credit">© 2026 LCN TEAM</span>
    </footer>
  </main>
  <div class="game dn">
    <!-- is to remove dn -->
    <div class="newspaper"> 
      <img src="assets/newspaper.jpg" alt="Newspaper"> 
    </div>
    <div class="clock-show dn">
      <div class="clock-js-import"></div>
    </div>
    <div class="game-view">
      <div class="student-center">
          
      </div>
      <div class="game-ui">
      
        <div class="game-clock ">
            <div class="clock-js-import"></div>
        </div>
        <div class="arrows">
            <div class="arrow left">
            &lt;
            </div>
            <div class="arrow right">
            &gt;
            </div>
        </div>
        <div class="cameras-button">
          <img src="assets_exp/cameras.png" alt="camera_btn">
        </div>
        <div class="ipad ">
          <div class="ipad-screen sc-flicker">
            <img src="assets/textures/texture_smudges.avif" class="ipad-texture" alt="iPad texture">
            <div class="ipad-screen-data" id="ips-data">
              <div class="rec-circle">
                <span
                  aria-label="Recording"
                  role="img"
                  style="display:inline-block;width:12px;height:12px;border-radius:50%;background:#ff1f1f;box-shadow:0 0 8px #ff1f1f;"
                ></span>
              </div>
              <div class="game-border dn">
              </div>
             <div class="map-cont">
               <div class="map">
                <div class="room" id="a1">
                   <span>
                     A1
                   </span>
                 </div>
                <div class="room" id="a3">
                   <span>
                     A3
                   </span>
                 </div>
                 <div class="room" id="b1">
                   <span>
                     B1
                   </span>
                 </div>
                 <div class="room" id="b3">
                   <span>
                     B3
                   </span>
                 </div>
                 <div class="room" id="c1">
                   <span>
                     C1
                   </span>
                 </div>
                 <div class="room" id="c3">
                   <span>
                      C3
                   </span>
                 </div>
                 <div class="room" id="d3">
                   <span>
                     D3
                   </span>
                 </div>
                 <div class="room" id="GYM">
                   <span>
                     GYM
                   </span>
                 </div>
                 <div class="room" id="lounge">
                   <span>
                     LOUNGE
                   </span>
                 </div>
                  <div class="room" id="office">
                    <span>
                      OFC
                    </span>
                  </div>
                <img src="assets/thsmap.png" alt="Map of the school">
              </div>
             </div>
            </div>
          </div>
          <div class="camera-hole"></div> 
          <div class="home-button"></div>
        </div>
        <div class="power-info">
          <div class="power-remaining">
            <span id="power-percentage">Power: 100%</span>
          </div>
          <div class="usage-cont">
            <span id="power-usage">Usage </span>
            <div class="usage" id="u1"></div>
            <div class="usage" id="u2"></div>
            <div class="usage" id="u3"></div>
            <div class="usage" id="u4"></div>
          </div>
        </div>
      </div>
    </div>
  </div>

    <script type="module" src="js/animation.js"></script>
  <script type="module" src="js/util.js"></script>
  <script type="module" src="js/clock.js"></script>
  <script type="module" src="js/game.js"></script>


</body>
</html>
